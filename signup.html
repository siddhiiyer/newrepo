<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainly - Sign Up</title>
    <script>
        (function() {
            const theme = localStorage.getItem('sustainly-theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-color: #F8F9F5;
            --text-color: #1A1D19;
            --primary-green: #37533D;
            --accent-green: #A8C69F;
            --light-green: #E4EFDE;
            --lighter-green: #F0F4ED;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-color: #080A08;
            --text-color: #F8F9F5;
            --primary-green: #6EE7B7;
            --accent-green: #34D399;
            --light-green: #111827;
            --lighter-green: #0F172A;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(110, 231, 183, 0.1);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] header {
            background: rgba(17, 24, 39, 0.7);
            border-color: rgba(110, 231, 183, 0.08);
        }

        [data-theme="dark"] nav a { color: rgba(110, 231, 183, 0.7); }
        [data-theme="dark"] .glass-card { 
            background: rgba(17, 24, 39, 0.7); 
            border-color: rgba(110, 231, 183, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        [data-theme="dark"] .signup-title { color: white; }
        [data-theme="dark"] .form-label { color: rgba(110, 231, 183, 0.8); }
        [data-theme="dark"] .input-styled { background: rgba(255,255,255,0.03); color: white; border-color: rgba(255,255,255,0.1); }
        [data-theme="dark"] .input-styled:focus { border-color: var(--primary-green); background: rgba(255,255,255,0.05); }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(168, 198, 159, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(55, 83, 61, 0.03) 0px, transparent 50%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Header/Navbar Refresh */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 4rem);
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-green);
            gap: 0.5rem;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        nav {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #555E52;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--primary-green);
        }

        .btn-header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--accent-green) 100%);
            color: #080A08;
            border: none;
            padding: 0.75rem 1.6rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(110, 231, 183, 0.2);
        }

        .btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(110, 231, 183, 0.4);
        }

        /* Sign Up Section Refresh */
        .signup-container {
            display: flex;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            margin: 8rem auto 4rem;
            width: 100%;
            max-width: 1100px;
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: 700px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-col {
            flex: 1.2;
            position: relative;
            background-color: #080A08;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
            opacity: 0.6;
            filter: grayscale(0.2) contrast(1.1);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 5rem 3rem;
            color: white;
            background: linear-gradient(to top, rgba(8, 10, 8, 0.95) 0%, rgba(8, 10, 8, 0.6) 50%, transparent 100%);
            z-index: 10;
        }

        .image-overlay h3 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, #FFF 60%, #6EE7B7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .image-overlay p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            max-width: 380px;
        }

        .form-col {
            flex: 1;
            padding: 5rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .form-col h2 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-subtitle {
            color: #667064;
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary-green);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border-radius: 18px;
            border: 1px solid rgba(110, 231, 183, 0.1);
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus {
            background-color: rgba(110, 231, 183, 0.05);
            border-color: var(--primary-green);
            box-shadow: 0 0 20px rgba(110, 231, 183, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--accent-green) 100%);
            color: #080A08;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(110, 231, 183, 0.2);
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(110, 231, 183, 0.4);
            filter: brightness(1.1);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #667064;
        }

        .login-link a {
            color: var(--primary-green);
            font-weight: 800;
            text-decoration: none;
            margin-left: 0.25rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2.5rem 0;
            color: #A8C69F;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(168, 198, 159, 0.2);
        }

        .divider::before { margin-right: 1.5rem; }
        .divider::after { margin-left: 1.5rem; }

        /* Social Login Refresh */
        .btn-social {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.1rem;
            border-radius: 18px;
            border: 1px solid rgba(110, 231, 183, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2rem;
        }

        .btn-social:hover {
            background-color: rgba(110, 231, 183, 0.08);
            border-color: var(--primary-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-social svg {
            width: 20px;
            height: 20px;
        }

        /* Image Overlay Refresh */
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 4rem 2.5rem;
            color: white;
            background: linear-gradient(to top, rgba(55, 83, 61, 0.9) 0%, transparent 100%);
            z-index: 10;
        }

        .image-overlay h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }

        .image-overlay p {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        @media (max-width: 900px) {
            .signup-container {
                flex-direction: column;
                margin-top: 7rem;
                min-height: auto;
            }

            .image-col {
                min-height: 250px;
                border-radius: 32px 32px 0 0;
            }

            .form-col {
                padding: 3rem 2rem;
            }

            header {
                width: calc(100% - 2rem);
                padding: 1rem 1.5rem;
            }

            nav { display: none; }
        }
        .theme-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--primary-green);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(55, 83, 61, 0.3);
            z-index: 2000;
            transition: var(--transition);
            border: none;
        }

        .theme-fab:hover {
            transform: scale(1.1) rotate(15deg);
        }

        [data-theme="dark"] .sun-icon { display: block; }
        [data-theme="dark"] .moon-icon { display: none; }
        .sun-icon { display: none; }
        .moon-icon { display: block; }
    </style>
</head>

<body>
    <button class="theme-fab" onclick="toggleTheme()" id="theme-toggle">
        <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="container">
        <header>
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="Sustainly Logo" style="height: 36px; border-radius: 50%;">
                Sustainly
            </a>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
            </nav>
            <button class="btn-header" onclick="location.href='signup.html'">Get Started</button>
        </header>

        <section class="signup-container">
            <div class="image-col">
                <img src="signup.png" alt="Tiny green seedling in dark soil">
                <div class="image-overlay">
                    <h3>Your journey to zero starts here.</h3>
                    <p>Every small action ripples into a healthier planet. Track, optimize, and inspire.</p>
                </div>
            </div>

            <div class="form-col">
                <h2>Create Account</h2>
                <p class="form-subtitle">Start your journey.</p>

                <form id="signup-form">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="hello@sustainly.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit">Sign Up</button>

                    <div class="divider">Or Continue With</div>

                    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <button type="button" class="btn-social" onclick="loginWithGoogle()">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            Google
                        </button>
                    </div>

                    <p class="login-link">Already have an account? <a href="login.html">Login</a></p>

                    <div class="terms">
                        By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy
                            Policy</a>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        window.toggleTheme = function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('sustainly-theme', newTheme);
        };

        const firebaseConfig = {
            apiKey: "AIzaSyB4X5aovlc_zctM91qC55ouPOx31VVhMow",
            authDomain: "sustainly-d5fa6.firebaseapp.com",
            projectId: "sustainly-d5fa6",
            storageBucket: "sustainly-d5fa6.firebasestorage.app",
            messagingSenderId: "455905855613",
            appId: "1:455905855613:web:d24e30a2c54c0410b98914",
            measurementId: "G-2WJH60016H"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function loginWithGoogle() {
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    localStorage.setItem('sustainlyUser', JSON.stringify({
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL
                    }));
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    console.error("Signup failed:", error);
                    alert("Google Signup failed. Please ensure you have enabled Google Sign-In in your Firebase console.");
                });
        }

        // Email/Password Sign Up
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullname = document.getElementById('fullname').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            btn.innerText = 'Creating account...';
            btn.disabled = true;

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    return user.updateProfile({
                        displayName: fullname
                    });
                })
                .then(() => {
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    console.error("Signup failed:", error);
                    alert("Signup failed: " + error.message);
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
        });
    </script>
</body>

</html>
