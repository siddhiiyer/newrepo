<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainly</title>
    <script>
        (function() {
            const theme = localStorage.getItem('sustainly-theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-color: #F8F9F5;
            --text-color: #1A1D19;
            --primary-green: #37533D;
            --accent-green: #A8C69F;
            --light-green: #E4EFDE;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-color: #080A08;
            --text-color: #F8F9F5;
            --primary-green: #6EE7B7;
            --accent-green: #34D399;
            --light-green: #111827;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(110, 231, 183, 0.1);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] header {
            background: rgba(17, 24, 39, 0.7);
            border-color: rgba(110, 231, 183, 0.08);
        }

        [data-theme="dark"] nav a { color: rgba(110, 231, 183, 0.7); }
        [data-theme="dark"] nav a.active { color: white; }
        [data-theme="dark"] .title { color: white; }
        [data-theme="dark"] .glass-card { 
            background: rgba(17, 24, 39, 0.7); 
            border-color: rgba(110, 231, 183, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        [data-theme="dark"] .title span {
            background: linear-gradient(135deg, #6EE7B7 0%, #34D399 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(168, 198, 159, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(55, 83, 61, 0.05) 0px, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {

            max-width: 100%;
            margin: auto;
            position: relative;
        }

        /* Navbar Refinement */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            position: sticky;
            top: 20px;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            margin: 1.5rem 2rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        header:hover {
            box-shadow: var(--shadow-lg);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-green);
            gap: 0.6rem;
            letter-spacing: -0.01em;
        }

        nav {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #4A5147;
            font-weight: 500;
            font-size: 0.95rem;
            position: relative;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--primary-green);
        }

        nav a.active {
            color: var(--primary-green);
            font-weight: 600;
        }

        nav a.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--primary-green);
        }

        .btn-header {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(55, 83, 61, 0.2);
        }

        .btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(55, 83, 61, 0.3);
        }

        /* Hero Content Redesign */
        .hero {
            text-align: center;
            padding: 6rem 2rem 4rem;
            max-width: 900px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(30px);
            animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 5.5rem;
            line-height: 1.05;
            font-weight: 800;
            margin-bottom: 2rem;
            letter-spacing: -0.04em;
            color: #121411;
        }

        .title span {
            background: linear-gradient(135deg, var(--primary-green) 0%, #688F6D 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #555E52;
            line-height: 1.6;
            margin-bottom: 3.5rem;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 400;
        }

        .action-buttons {
            display: flex;
            gap: 1.25rem;
            justify-content: center;
            margin-bottom: 5rem;
        }

        .btn {
            padding: 1.1rem 3.5rem;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 10px 30px rgba(55, 83, 61, 0.2);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(55, 83, 61, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--primary-green);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            background: #F0F2EE;
            transform: scale(1.05);
        }

        /* Modern Image Display */
        .image-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto 6rem;
            background: white;
            padding: 1.5rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transform: translateY(50px);
            transition: var(--transition);
            transition-delay: 0.2s;
        }

        .image-container.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 25px;
            object-fit: cover;
            aspect-ratio: 16 / 8;
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem 2rem;
                flex-direction: column;
                gap: 1rem;
            }

            .title {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }
        }
        .theme-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--primary-green);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(55, 83, 61, 0.3);
            z-index: 1000;
            transition: var(--transition);
            border: none;
        }

        .theme-fab:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 15px 35px rgba(55, 83, 61, 0.4);
        }

        [data-theme="dark"] .sun-icon { display: block; }
        [data-theme="dark"] .moon-icon { display: none; }
        .sun-icon { display: none; }
        .moon-icon { display: block; }
    </style>
</head>

<body>
    <button class="theme-fab" onclick="toggleTheme()" id="theme-toggle">
        <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="container">
        <header>
            <div class="logo">
                <img src="logo.jpg" alt="Sustainly Logo" style="height: 36px; border-radius: 50%;">
                Sustainly
            </div>
            <nav>
                <a href="index.html" class="active">Home</a>
                <a href="about.html">About</a>
            </nav>
            <button class="btn-header" onclick="location.href='signup.html'">Get Started</button>
        </header>

        <section class="hero">
            <h1 class="title">Track <span>better.</span><br>Live <span>lighter.</span></h1>
            <p class="subtitle">Join thousands making a daily difference. A personal carbon budget tracker designed for a sustainable future.</p>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="location.href='signup.html'">Get Started Free</button>
                <button class="btn btn-secondary" onclick="location.href='login.html'">Welcome Back</button>
            </div>
        </section>

        <div class="image-container" id="reveal-image">
            <img src="hero.png" alt="Sustainly Dashboard Preview">
        </div>
    </div>

    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('sustainly-theme', newTheme);
        }

        // Simple Reveal on Scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                }
            });
        }, { threshold: 0.1 });

        const revealEl = document.getElementById('reveal-image');
        if (revealEl) observer.observe(revealEl);
    </script>
</body>

</html>
